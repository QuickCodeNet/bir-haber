services:
  bir-haber-pg-data:
    ports:
      - "${PGSQL_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=dockerf
    volumes:
      - quickcode-bir-haber-pg-data:/var/lib/postgresql
  
  bir-haber-mysql-data:
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - quickcode-bir-haber-mysql-data:/var/lib/mysql
      - "~/sql-scripts/setup.sql:/docker-entrypoint-initdb.d/1.sql"
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=RootDocker!
      - MYSQL_USER=docker
      - MYSQL_PASSWORD=dockerf

  bir-haber-sql-data:
    environment:
      - MSSQL_SA_PASSWORD=Pass@word
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
    ports:
      - "${SQL_PORT:-5433}:1433"
    volumes:
      - quickcode-bir-haber-sql-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  bir-haber-elasticsearch:
    environment:
      - xpack.security.enabled=false
      - discovery.type=single-node
    deploy:
      resources:
        limits:
          memory: 1GB
    ports:
      - "${ELASTIC_PORT:-9200}:9200"
    volumes:
      - quickcode-bir-haber-elasticsearch-data:/usr/share/elasticsearch/data
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: curl -s http://bir-haber-elasticsearch:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  bir-haber-kibana:
    environment:
      - ELASTICSEARCH_HOSTS=http://bir-haber-elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    volumes:
      - quickcode-bir-haber-kibana-data:/usr/share/kibana/data
    restart: always
    depends_on:
      - bir-haber-elasticsearch

  quickcode-bir-haber-gateway-api:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Local
      - ASPNETCORE_URLS=http://+
      - GATEWAY_JWT_PRIVATE_KEY=${GATEWAY_JWT_PRIVATE_KEY}
      - GATEWAY_INTERNAL_TOKEN_KEY=${GATEWAY_INTERNAL_TOKEN_KEY}
    ports:
      - "${GATEWAY_PORT:-6060}:80"

  quickcode-bir-haber-identity-module-api:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Local
      - ASPNETCORE_URLS=http://+
      - GATEWAY_JWT_PUBLIC_KEY=${GATEWAY_JWT_PUBLIC_KEY}
      - USER_JWT_PRIVATE_KEY=${USER_JWT_PRIVATE_KEY}
    ports:
      - "6001:80"


  quickcode-bir-haber-category-module-api:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Local
      - ASPNETCORE_URLS=http://+
      - GATEWAY_JWT_PUBLIC_KEY=${GATEWAY_JWT_PUBLIC_KEY}
      
    ports:
      - "6002:80"


  quickcode-bir-haber-comment-module-api:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Local
      - ASPNETCORE_URLS=http://+
      - GATEWAY_JWT_PUBLIC_KEY=${GATEWAY_JWT_PUBLIC_KEY}
      
    ports:
      - "6003:80"


  quickcode-bir-haber-content-module-api:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Local
      - ASPNETCORE_URLS=http://+
      - GATEWAY_JWT_PUBLIC_KEY=${GATEWAY_JWT_PUBLIC_KEY}
      
    ports:
      - "6004:80"


  quickcode-bir-haber-notification-module-api:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Local
      - ASPNETCORE_URLS=http://+
      - GATEWAY_JWT_PUBLIC_KEY=${GATEWAY_JWT_PUBLIC_KEY}
      
    ports:
      - "6005:80"


  quickcode-bir-haber-tag-module-api:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Local
      - ASPNETCORE_URLS=http://+
      - GATEWAY_JWT_PUBLIC_KEY=${GATEWAY_JWT_PUBLIC_KEY}
      
    ports:
      - "6006:80"


  quickcode-bir-haber-weather-module-api:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Local
      - ASPNETCORE_URLS=http://+
      - GATEWAY_JWT_PUBLIC_KEY=${GATEWAY_JWT_PUBLIC_KEY}
      
    ports:
      - "6007:80"


#[-WEB-]
  quickcode-bir-haber-portal:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Local
      - ASPNETCORE_URLS=http://+
      - AZURE_ACCOUNT_NAME=quickcodeblobstorage
      - AZURE_ACCOUNT_KEY=azureAccountKeySecret
      - AZURE_BLOB_CONTAINER_NAME=images
    ports:
      - "${PORTAL_PORT:-6020}:80"
      
  quickcode-bir-haber-event-listener-service:
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Local
      - ASPNETCORE_URLS=http://+
      - GATEWAY_INTERNAL_TOKEN_KEY=${GATEWAY_INTERNAL_TOKEN_KEY}
    ports:
      - "${EVENT_LISTENER_PORT:-6100}:80"
      
volumes:
  quickcode-bir-haber-pg-data:
    external: false
    
  quickcode-bir-haber-mysql-data:
    external: false
    
  quickcode-bir-haber-sql-data:
    external: false
    
  quickcode-bir-haber-elasticsearch-data:
    external: false
    
  quickcode-bir-haber-kibana-data:
    external: false
