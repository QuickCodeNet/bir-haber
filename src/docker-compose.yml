services:
  bir-haber-pg-data:
    container_name: "bir-haber-pg-data"
    image: postgres:18

  bir-haber-sql-data:
    container_name: "bir-haber-sql-data"
    image: mcr.microsoft.com/mssql/server:2025-latest
    
  bir-haber-mysql-data:
    container_name: "bir-haber-mysql-data"
    image: mysql:8.3

  bir-haber-elasticsearch:
    container_name: bir-haber-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0

  bir-haber-kibana:
    container_name: bir-haber-kibana
    image: docker.elastic.co/kibana/kibana:8.11.0

  quickcode-bir-haber-gateway-api:
    container_name: "quickcode-bir-haber-gateway-api"
    image: ${DOCKER_REGISTRY-}quickcode-bir-haber-gateway-api
    build:
      context: .
      dockerfile: Presentation/QuickCode.BirHaber.Gateway/Dockerfile

  quickcode-bir-haber-identity-module-api:
    container_name: "quickcode-bir-haber-identity-module-api"
    image: ${DOCKER_REGISTRY-}quickcode-bir-haber-identity-module-api
    build:
      context: . 
      dockerfile: Modules/IdentityModule/Presentation/QuickCode.BirHaber.IdentityModule.Api/Dockerfile
    depends_on:
      bir-haber-sql-data:
        condition: service_healthy
      bir-haber-pg-data:
        condition: service_started
      

  quickcode-bir-haber-category-module-api:
    container_name: "quickcode-bir-haber-category-module-api"
    image: ${DOCKER_REGISTRY-}quickcode-bir-haber-category-module-api
    build:
      context: . 
      dockerfile: Modules/CategoryModule/Presentation/QuickCode.BirHaber.CategoryModule.Api/Dockerfile
    depends_on:
      bir-haber-sql-data:
        condition: service_healthy
      bir-haber-pg-data:
        condition: service_started
      

  quickcode-bir-haber-comment-module-api:
    container_name: "quickcode-bir-haber-comment-module-api"
    image: ${DOCKER_REGISTRY-}quickcode-bir-haber-comment-module-api
    build:
      context: . 
      dockerfile: Modules/CommentModule/Presentation/QuickCode.BirHaber.CommentModule.Api/Dockerfile
    depends_on:
      bir-haber-sql-data:
        condition: service_healthy
      bir-haber-pg-data:
        condition: service_started
      

  quickcode-bir-haber-content-module-api:
    container_name: "quickcode-bir-haber-content-module-api"
    image: ${DOCKER_REGISTRY-}quickcode-bir-haber-content-module-api
    build:
      context: . 
      dockerfile: Modules/ContentModule/Presentation/QuickCode.BirHaber.ContentModule.Api/Dockerfile
    depends_on:
      bir-haber-sql-data:
        condition: service_healthy
      bir-haber-pg-data:
        condition: service_started
      

  quickcode-bir-haber-notification-module-api:
    container_name: "quickcode-bir-haber-notification-module-api"
    image: ${DOCKER_REGISTRY-}quickcode-bir-haber-notification-module-api
    build:
      context: . 
      dockerfile: Modules/NotificationModule/Presentation/QuickCode.BirHaber.NotificationModule.Api/Dockerfile
    depends_on:
      bir-haber-sql-data:
        condition: service_healthy
      bir-haber-pg-data:
        condition: service_started
      

  quickcode-bir-haber-tag-module-api:
    container_name: "quickcode-bir-haber-tag-module-api"
    image: ${DOCKER_REGISTRY-}quickcode-bir-haber-tag-module-api
    build:
      context: . 
      dockerfile: Modules/TagModule/Presentation/QuickCode.BirHaber.TagModule.Api/Dockerfile
    depends_on:
      bir-haber-sql-data:
        condition: service_healthy
      bir-haber-pg-data:
        condition: service_started
      

  quickcode-bir-haber-weather-module-api:
    container_name: "quickcode-bir-haber-weather-module-api"
    image: ${DOCKER_REGISTRY-}quickcode-bir-haber-weather-module-api
    build:
      context: . 
      dockerfile: Modules/WeatherModule/Presentation/QuickCode.BirHaber.WeatherModule.Api/Dockerfile
    depends_on:
      bir-haber-sql-data:
        condition: service_healthy
      bir-haber-pg-data:
        condition: service_started
      

#[-WEB-]
  
  bir-haber-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bir-haber-zookeeper
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  bir-haber-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bir-haber-kafka
    depends_on:
      - bir-haber-zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: bir-haber-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://bir-haber-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  bir-haber-kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: bir-haber-kafdrop
    ports:
      - "${KAFDROP_PORT:-9000}:9000"
    depends_on:
      - bir-haber-kafka
    environment:
      KAFKA_BROKERCONNECT: bir-haber-kafka:9092
        
  quickcode-bir-haber-portal:
    container_name: "quickcode-bir-haber-portal"
    image: ${DOCKER_REGISTRY-}quickcode-bir-haber-portal
    build:
      context: .
      dockerfile: Presentation/QuickCode.BirHaber.Portal/Dockerfile
      
  quickcode-bir-haber-event-listener-service:
    container_name: "quickcode-bir-haber-event-listener-service"
    image: ${DOCKER_REGISTRY-}quickcode-bir-haber-event-listener-service
    build:
      context: .
      dockerfile: Services/QuickCode.BirHaber.EventListenerService/Dockerfile
